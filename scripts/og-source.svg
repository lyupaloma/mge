<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Фоновый градиент: глубокий medical navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#050912"/>
      <stop offset="55%" stop-color="#070D1A"/>
      <stop offset="100%" stop-color="#0B1730"/>
    </linearGradient>
    <!-- Золотой градиент для акцентного текста -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8A96E"/>
      <stop offset="50%"  stop-color="#DFC28A"/>
      <stop offset="100%" stop-color="#C8A96E"/>
    </linearGradient>
    <!-- Лёгкое золотое свечение справа -->
    <radialGradient id="glow" cx="78%" cy="42%" r="55%">
      <stop offset="0%"  stop-color="#C8A96E" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#C8A96E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="20%" cy="80%" r="50%">
      <stop offset="0%"  stop-color="#3B82F6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Фон -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glowBlue)"/>

  <!-- Сетка (едва заметная, медицинская) -->
  <g stroke="#C8A96E" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Фоновая спираль ДНК справа, уходящая в перспективу (полупрозрачная) -->
  <g opacity="0.5" transform="translate(940, 315)">
    <g stroke-linecap="round" fill="none">
      <!-- две синусоидальные нити -->
      <path d="M -60 -250 C 90 -200, 90 -120, -60 -70 C -210 -20, -210 60, -60 110 C 90 160, 90 240, -60 290"
            stroke="#C8A96E" stroke-opacity="0.35" stroke-width="3"/>
      <path d="M 60 -250 C -90 -200, -90 -120, 60 -70 C 210 -20, 210 60, 60 110 C -90 160, -90 240, 60 290"
            stroke="#3B82F6" stroke-opacity="0.30" stroke-width="3"/>
      <!-- перекладины -->
      <g stroke="#C8A96E" stroke-opacity="0.18" stroke-width="2">
        <line x1="-52" y1="-220" x2="52" y2="-220"/>
        <line x1="-2"  y1="-170" x2="2"  y2="-170"/>
        <line x1="-52" y1="-120" x2="52" y2="-120"/>
        <line x1="-58" y1="-70"  x2="58" y2="-70"/>
        <line x1="-52" y1="-20"  x2="52" y2="-20"/>
        <line x1="-2"  y1="30"   x2="2"  y2="30"/>
        <line x1="-52" y1="60"   x2="52" y2="60"/>
        <line x1="-58" y1="110"  x2="58" y2="110"/>
        <line x1="-52" y1="160"  x2="52" y2="160"/>
        <line x1="-2"  y1="210"  x2="2"  y2="210"/>
        <line x1="-52" y1="240"  x2="52" y2="240"/>
      </g>
      <!-- узлы -->
      <g>
        <circle cx="-60" cy="-250" r="7" fill="#C8A96E" fill-opacity="0.7"/>
        <circle cx="60"  cy="-250" r="7" fill="#3B82F6" fill-opacity="0.6"/>
        <circle cx="-60" cy="-70"  r="7" fill="#3B82F6" fill-opacity="0.6"/>
        <circle cx="60"  cy="-70"  r="7" fill="#C8A96E" fill-opacity="0.7"/>
        <circle cx="-60" cy="110"  r="7" fill="#C8A96E" fill-opacity="0.7"/>
        <circle cx="60"  cy="110"  r="7" fill="#3B82F6" fill-opacity="0.6"/>
        <circle cx="-60" cy="290"  r="7" fill="#3B82F6" fill-opacity="0.6"/>
        <circle cx="60"  cy="290"  r="7" fill="#C8A96E" fill-opacity="0.7"/>
      </g>
    </g>
  </g>

  <!-- Логотип / название бренда (верх слева) -->
  <text x="80" y="92" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" letter-spacing="1">
    <tspan fill="#FFFFFF">MGE</tspan><tspan dx="14" fill="url(#gold)">DNA</tspan>
  </text>
  <!-- Бейдж "Лицензированная лаборатория" -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="560" height="40" rx="20" fill="#C8A96E" fill-opacity="0.08" stroke="#C8A96E" stroke-opacity="0.3"/>
    <circle cx="24" cy="20" r="4" fill="#C8A96E"/>
    <text x="42" y="27" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" letter-spacing="2" fill="#C8A96E">АККРЕДИТОВАННАЯ ЛАБОРАТОРИЯ · АЛМАТЫ</text>
  </g>

  <!-- Главный заголовок -->
  <text x="80" y="320" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="800" letter-spacing="-1" fill="#FFFFFF">Генетическая</text>
  <text x="80" y="408" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="800" letter-spacing="-1" fill="#FFFFFF">лаборатория</text>

  <!-- Акцентный текст (золото) -->
  <text x="80" y="500" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" letter-spacing="-1" fill="url(#gold)">Результат — за 1 день</text>

  <!-- Буллиты внизу -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#C9D4E3">
    <!-- Лицензия -->
    <g transform="translate(80, 560)">
      <path d="M11 1 L20 5 V11 C20 16 16 20 11 21 C6 20 2 16 2 11 V5 Z" fill="none" stroke="#C8A96E" stroke-width="2" stroke-linejoin="round"/>
      <path d="M7 11 l3 3 l5 -6" fill="none" stroke="#C8A96E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="18">Лицензия МЮ РК</text>
    </g>
    <!-- Точность -->
    <g transform="translate(400, 560)">
      <circle cx="11" cy="11" r="10" fill="none" stroke="#C8A96E" stroke-width="2"/>
      <circle cx="11" cy="11" r="3" fill="#C8A96E"/>
      <text x="34" y="18">Точность 99,9999%</text>
    </g>
    <!-- Выезд -->
    <g transform="translate(760, 560)">
      <path d="M2 14 V8 a2 2 0 0 1 2 -2 h9 l4 4 h3 a2 2 0 0 1 2 2 v2" fill="none" stroke="#C8A96E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="7" cy="16" r="2.5" fill="none" stroke="#C8A96E" stroke-width="2"/>
      <circle cx="18" cy="16" r="2.5" fill="none" stroke="#C8A96E" stroke-width="2"/>
      <text x="34" y="18">Выезд на дом</text>
    </g>
  </g>
</svg>
